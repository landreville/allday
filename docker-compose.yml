services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: allday
      POSTGRES_PASSWORD: allday
      POSTGRES_DB: allday_development
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
